; =============================================================================
; PlatformIO project configuration
; Target: Adafruit ESP32-S2 Feather + Adafruit TMC2209 Breakout (#6121)
; =============================================================================

[platformio]
src_dir   = linear_actuator
data_dir  = linear_actuator/data
; Keep build output and library deps in .nosync directories so macOS iCloud
; Drive ignores them entirely. iCloud blocks small rapid writes (GCC .d dep
; files, SCons .sconsign tmp files) on synced folders in the project path.
build_dir   = .pio.nosync/build
libdeps_dir = .pio.nosync/libdeps

[env:adafruit_feather_esp32s2]
platform  = espressif32
board     = adafruit_feather_esp32s2
framework = arduino

; Serial monitor — matches SERIAL_BAUD in config.h
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, default

; Libraries
lib_deps =
    teemuatlut/TMCStepper@^0.7.3
    waspinator/AccelStepper@^1.64
    bblanchon/ArduinoJson@^6.21.0
    me-no-dev/AsyncTCP@^1.1.1
    ; Re-resolves/reinstalls on every single build (harmless but slow — its
    ; own manifest names it "ESP Async WebServer", which mismatches this
    ; registry shorthand). Tried pinning by git URL instead, but the repo's
    ; only available ref is master HEAD, which has moved to an incompatible
    ; v3.x rewrite with a different AsyncTCP dependency — not worth the
    ; regression risk to fix a cosmetic slowdown. Leaving as-is.
    me-no-dev/ESPAsyncWebServer@^1.2.3

; LittleFS — Angular front-end bundle stored in linear_actuator/data/
; Build bundle first:  cd dustgate-ui && bash deploy.sh
; Then upload to ESP32: pio run --target uploadfs
board_build.filesystem = littlefs

; Exclude the Arduino IDE unity-build shim — PlatformIO finds subdirectory
; sources automatically, so including sources.cpp would compile everything twice.
build_src_filter = +<*> -<sources.cpp>

; Extra script: serialises the build + clears dep-file flags to fix
; "opening dependency file: No such file or directory" on first builds.
extra_scripts = pre:extra_script.py

; belt-and-suspenders: also remove -MMD from any flag list where it appears
build_unflags = -MMD

; ESP32-S2 uses native USB CDC for Serial
; This flag enables it on boot, matching the Arduino IDE board default.
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
